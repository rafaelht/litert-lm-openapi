services:
  litert-lm-openapi:
    build: .
    container_name: litert-lm-openapi
    restart: unless-stopped
    environment:
      MODEL_PATH: ${MODEL_PATH:-/models/gemma-4-E2B-it.litertlm/model.litertlm}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-1800}
      MAX_ACTIVE_CONVERSATIONS: ${MAX_ACTIVE_CONVERSATIONS:-1000}
      MAX_NUM_IMAGES: ${MAX_NUM_IMAGES:-4}
    ports:
      - "${HOST_PORT:-8005}:${SERVER_PORT:-8000}"
    volumes:
      - /volume2/docker/litertlm/litert-home/models:/models:ro
    deploy:
      resources:
        limits:
          memory: 3G
